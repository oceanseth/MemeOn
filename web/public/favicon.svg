<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="foil" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0" stop-color="#7fd4ff"/>
  <stop offset="0.5" stop-color="#ff9af5"/>
  <stop offset="1" stop-color="#ffd76a"/></linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="#0b0d14"/>
  <g transform="translate(512 512) scale(1.18) translate(-512 -512)">
    <!-- back cards, fanned -->
    <g transform="rotate(-14 512 560)" opacity="1">
      <rect x="322" y="222" width="380" height="560" rx="46"
        fill="#151a28" stroke="#39415c" stroke-width="18"/>
    </g>
    <g transform="rotate(-7 512 560)" opacity="1">
      <rect x="322" y="212" width="380" height="560" rx="46"
        fill="#1a2136" stroke="#4a5578" stroke-width="18"/>
    </g>
    <!-- front card with foil border -->
    <rect x="322" y="202" width="380" height="560" rx="46"
      fill="#10131d" stroke="url(#foil)" stroke-width="26"/>
    <!-- rising value line -->
    <path d="M 384 646 L 460 546 L 516 590 L 596 466"
      fill="none" stroke="url(#foil)" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- spark at the top of the line -->
    <path d="M 600 324 L 620 384 L 680 404 L 620 424 L 600 484 L 580 424 L 520 404 L 580 384 Z"
      fill="url(#foil)"/>
  </g>
</svg>